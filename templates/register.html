{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4 shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-heartbeat fa-3x mb-3" style="color:#dc3545"></i>
                <h3 style="color:white; font-weight:800;">Create Account</h3>
                <p style="color:#666;">Join CardioPredict AI and monitor your heart health</p>
            </div>
            <form method="POST" action="/register">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                            <i class="fas fa-calendar"></i>
                        </span>
                        <input type="number" name="age" class="form-control" placeholder="Enter your age" min="1" max="120" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
                    </div>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-danger btn-lg">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </div>
            </form>
            <div class="text-center">
                <p style="color:#666;">Already have an account?
                    <a href="/login" style="color:#dc3545; text-decoration:none; font-weight:600;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
