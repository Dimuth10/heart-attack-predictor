{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:85vh; padding:40px 0;">
    <div class="col-md-6">
        <div class="glass-card p-5" style="border:1px solid rgba(220,53,69,0.2);">

            <!-- Header -->
            <div class="text-center mb-5">
                <div style="width:80px; height:80px; background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <i class="fas fa-user-plus fa-2x" style="color:#dc3545"></i>
                </div>
                <h3 style="color:white; font-weight:800; margin-bottom:8px;">Create Account</h3>
                <p style="color:#555; font-size:0.9rem;">Join CardioPredict AI and monitor your heart health</p>
            </div>

            <form method="POST" action="/register">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Age</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                            <input type="number" name="age" class="form-control" placeholder="Your age" min="1" max="120" required>
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Create password" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>

                <div class="mb-4 p-3" style="background:rgba(220,53,69,0.05); border-radius:12px; border:1px solid rgba(220,53,69,0.1);">
                    <p style="color:#555; font-size:0.82rem; margin:0;">
                        <i class="fas fa-shield-alt me-2" style="color:#dc3545"></i>
                        By creating an account you agree this system is for educational purposes only and does not replace medical advice.
                    </p>
                </div>

                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-danger btn-lg py-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </div>
            </form>

            <div class="divider" style="margin:20px 0;"></div>

            <div class="text-center">
                <p style="color:#555; font-size:0.9rem; margin:0;">Already have an account?
                    <a href="/login" style="color:#dc3545; text-decoration:none; font-weight:600;"> Sign in here →</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
