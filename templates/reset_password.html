{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="animate-in" style="--delay:0.1s">

            <!-- Header -->
            <div class="text-center mb-4">
                <div class="rp-icon">
                    <i class="fas fa-key fa-2x" style="color:#6edba8"></i>
                    <div class="rp-icon-ring"></div>
                </div>
                <h3 style="color:white;font-weight:800;margin-bottom:8px;">Set New Password</h3>
                <p style="color:#666;font-size:0.9rem;">Choose a strong password for your account</p>
            </div>

            <div class="card p-4">
                <form method="POST" action="/reset-password/{{ token }}">

                    <div class="mb-3">
                        <label class="rp-label">New Password</label>
                        <div class="rp-input-wrap">
                            <i class="fas fa-lock rp-input-icon"></i>
                            <input type="password" name="new_password" id="newPw"
                                   class="rp-input" placeholder="Minimum 6 characters"
                                   required oninput="checkStrength(this.value)">
                        </div>
                        <!-- Strength bar -->
                        <div class="rp-strength mt-2" id="strengthWrap" style="display:none;">
                            <div class="rp-strength-bar">
                                <div class="rp-strength-fill" id="strengthFill"></div>
                            </div>
                            <small class="rp-strength-label" id="strengthLabel"></small>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="rp-label">Confirm New Password</label>
                        <div class="rp-input-wrap">
                            <i class="fas fa-lock rp-input-icon"></i>
                            <input type="password" name="confirm_password" id="confirmPw"
                                   class="rp-input" placeholder="Repeat new password"
                                   required oninput="checkMatch()">
                        </div>
                        <small class="rp-match-msg" id="matchMsg"></small>
                    </div>

                    <!-- Password Rules -->
                    <div class="rp-rules mb-4">
                        <div class="rp-rule" id="rule-len">
                            <i class="fas fa-circle me-2"></i>At least 6 characters
                        </div>
                        <div class="rp-rule" id="rule-upper">
                            <i class="fas fa-circle me-2"></i>One uppercase letter
                        </div>
                        <div class="rp-rule" id="rule-num">
                            <i class="fas fa-circle me-2"></i>One number
                        </div>
                    </div>

                    <button type="submit" class="rp-submit-btn" id="submitBtn">
                        <i class="fas fa-check me-2"></i>Reset Password
                        <span class="rp-btn-shine"></span>
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>

<style>
.animate-in { opacity:0; transform:translateY(18px); animation:fadeUp 0.5s ease forwards; animation-delay:var(--delay,0s); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.rp-icon {
    width:72px; height:72px; border-radius:50%;
    background:rgba(110,219,168,0.1); border:2px solid rgba(110,219,168,0.3);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 20px; position:relative;
}
.rp-icon-ring {
    position:absolute; width:88px; height:88px; border-radius:50%;
    border:1px solid rgba(110,219,168,0.15);
    animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
    0%,100%{transform:scale(1);opacity:0.4}
    50%{transform:scale(1.08);opacity:0.9}
}
.rp-label { color:rgba(255,255,255,0.65); font-weight:500; font-size:0.88rem; margin-bottom:7px; display:block; }
.rp-input-wrap { position:relative; }
.rp-input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#9b2335; font-size:0.85rem; }
.rp-input {
    width:100%; padding:13px 14px 13px 42px;
    background:rgba(255,255,255,0.05) !important;
    border:1px solid rgba(255,255,255,0.1) !important;
    color:#e0e0e0 !important; border-radius:12px;
    font-size:0.92rem; transition:all 0.3s;
}
.rp-input:focus {
    border-color:rgba(220,53,69,0.5) !important;
    box-shadow:0 0 0 3px rgba(220,53,69,0.1) !important;
    outline:none;
}
.rp-input::placeholder { color:rgba(255,255,255,0.2) !important; }
.rp-strength-bar { height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; }
.rp-strength-fill { height:100%; border-radius:2px; transition:all 0.3s; }
.rp-strength-label { font-size:0.75rem; }
.rp-match-msg { font-size:0.78rem; display:block; margin-top:4px; }
.rp-rules {
    background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05);
    border-radius:10px; padding:12px 14px; display:flex; flex-direction:column; gap:6px;
}
.rp-rule { color:#444; font-size:0.82rem; transition:color 0.3s; }
.rp-rule.pass { color:#6edba8; }
.rp-rule.pass i { color:#6edba8; }
.rp-submit-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,#198754,#0d6e43);
    border:none; border-radius:12px; color:white;
    font-weight:700; font-size:1rem; cursor:pointer;
    position:relative; overflow:hidden;
    box-shadow:0 5px 20px rgba(25,135,84,0.4);
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.rp-submit-btn:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 10px 30px rgba(25,135,84,0.55); }
.rp-btn-shine {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    animation:shine 2.5s infinite;
}
@keyframes shine { 0%{left:-100%} 50%,100%{left:100%} }
</style>

<script>
function checkStrength(v) {
    const wrap  = document.getElementById('strengthWrap');
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    if(!v){ wrap.style.display='none'; return; }
    wrap.style.display = 'block';

    let s = 0;
    if(v.length >= 6)          s++;
    if(v.length >= 10)         s++;
    if(/[A-Z]/.test(v))        s++;
    if(/[0-9]/.test(v))        s++;
    if(/[^A-Za-z0-9]/.test(v)) s++;

    const pct = (s/5)*100;
    fill.style.width = pct + '%';
    if(s<=2){ fill.style.background='#9b2335'; label.textContent='Weak'; label.style.color='#c44d5f'; }
    else if(s<=3){ fill.style.background='#ffc107'; label.textContent='Fair'; label.style.color='#ffd85e'; }
    else { fill.style.background='#198754'; label.textContent='Strong'; label.style.color='#6edba8'; }

    // Rules
    document.getElementById('rule-len').classList.toggle('pass',   v.length >= 6);
    document.getElementById('rule-upper').classList.toggle('pass', /[A-Z]/.test(v));
    document.getElementById('rule-num').classList.toggle('pass',   /[0-9]/.test(v));
}

function checkMatch() {
    const pw  = document.getElementById('newPw').value;
    const cpw = document.getElementById('confirmPw').value;
    const msg = document.getElementById('matchMsg');
    if(!cpw) { msg.textContent=''; return; }
    if(pw === cpw) { msg.textContent='✓ Passwords match'; msg.style.color='#6edba8'; }
    else           { msg.textContent='✗ Passwords do not match'; msg.style.color='#c44d5f'; }
}
</script>
{% endblock %}
