{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="card shadow-lg">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-stethoscope fa-3x mb-3" style="color:#dc3545"></i>
                    <h3 style="color:white; font-weight:800;">Heart Attack Risk Prediction</h3>
                    <p style="color:#666;">Enter your clinical parameters below for AI-powered risk assessment</p>
                </div>

                <form method="POST" action="/predict">
                    <!-- Row 1 -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Age</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-user"></i>
                                </span>
                                <input type="number" name="age" class="form-control" placeholder="e.g. 52" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Resting Blood Pressure <small style="color:#555">(mmHg)</small></label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-heartbeat"></i>
                                </span>
                                <input type="number" name="trestbps" class="form-control" placeholder="e.g. 120" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Cholesterol <small style="color:#555">(mg/dl)</small></label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-flask"></i>
                                </span>
                                <input type="number" name="chol" class="form-control" placeholder="e.g. 200" required>
                            </div>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Max Heart Rate <small style="color:#555">(thalach)</small></label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-pulse"></i>
                                </span>
                                <input type="number" name="thalach" class="form-control" placeholder="e.g. 150" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Oldpeak <small style="color:#555">(ST depression)</small></label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-chart-line"></i>
                                </span>
                                <input type="number" step="0.1" name="oldpeak" class="form-control" placeholder="e.g. 1.0" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">CA <small style="color:#555">(Major Vessels 0-3)</small></label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#1a2035; border-color:rgba(255,255,255,0.1); color:#666;">
                                    <i class="fas fa-project-diagram"></i>
                                </span>
                                <input type="number" name="ca" class="form-control" placeholder="0-3" min="0" max="3" required>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3 - Dropdowns -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sex</label>
                            <select name="sex" class="form-select" required>
                                <option value="">Select Sex</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Chest Pain Type</label>
                            <select name="cp" class="form-select" required>
                                <option value="">Select Type</option>
                                <option value="typical angina">Typical Angina</option>
                                <option value="atypical angina">Atypical Angina</option>
                                <option value="non-anginal">Non-Anginal</option>
                                <option value="asymptomatic">Asymptomatic</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Fasting Blood Sugar &gt; 120</label>
                            <select name="fbs" class="form-select" required>
                                <option value="">Select</option>
                                <option value="True">Yes</option>
                                <option value="False">No</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 4 -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Resting ECG</label>
                            <select name="restecg" class="form-select" required>
                                <option value="">Select</option>
                                <option value="normal">Normal</option>
                                <option value="lv hypertrophy">LV Hypertrophy</option>
                                <option value="st-t abnormality">ST-T Abnormality</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Exercise Induced Angina</label>
                            <select name="exang" class="form-select" required>
                                <option value="">Select</option>
                                <option value="True">Yes</option>
                                <option value="False">No</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Slope</label>
                            <select name="slope" class="form-select" required>
                                <option value="">Select</option>
                                <option value="upsloping">Upsloping</option>
                                <option value="flat">Flat</option>
                                <option value="downsloping">Downsloping</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 5 -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Thal</label>
                            <select name="thal" class="form-select" required>
                                <option value="">Select</option>
                                <option value="normal">Normal</option>
                                <option value="fixed defect">Fixed Defect</option>
                                <option value="reversable defect">Reversable Defect</option>
                            </select>
                        </div>
                    </div>

                    <div class="alert alert-info mt-2">
                        <i class="fas fa-info-circle me-2"></i>
                        This tool provides an educational risk estimate only. Always consult a qualified medical professional for clinical decisions.
                    </div>

                    <div class="d-grid gap-2 d-md-flex mt-3">
                        <button type="submit" class="btn btn-danger btn-lg flex-fill fw-bold">
                            <i class="fas fa-heartbeat me-2"></i>Predict Risk
                        </button>
                        <button type="reset" class="btn btn-outline-danger btn-lg flex-fill">
                            <i class="fas fa-redo me-2"></i>Reset
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
