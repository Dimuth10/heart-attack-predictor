{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
        <div class="animate-in" style="--delay:0.1s">

            <!-- Header -->
            <div class="text-center mb-4">
                <div class="fp-icon">
                    <i class="fas fa-lock fa-2x" style="color:#dc3545"></i>
                    <div class="fp-icon-ring"></div>
                </div>
                <h3 style="color:white;font-weight:800;margin-bottom:8px;">Forgot Password?</h3>
                <p style="color:#666;font-size:0.9rem;">Enter your email and we'll send you a reset link</p>
            </div>

            <div class="card p-4">
                <form method="POST" action="/forgot-password">

                    <div class="mb-4">
                        <label class="fp-label">Email Address</label>
                        <div class="fp-input-wrap">
                            <i class="fas fa-envelope fp-input-icon"></i>
                            <input type="email" name="email" class="fp-input"
                                   placeholder="Enter your registered email" required autofocus>
                        </div>
                    </div>

                    <button type="submit" class="fp-submit-btn">
                        <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                        <span class="fp-btn-shine"></span>
                    </button>

                </form>

                <div class="text-center mt-4">
                    <a href="/login" style="color:#555;font-size:0.85rem;text-decoration:none;transition:color 0.2s;">
                        <i class="fas fa-arrow-left me-1"></i>Back to Login
                    </a>
                </div>
            </div>

            <!-- Info Box -->
            <div class="fp-info mt-3">
                <i class="fas fa-info-circle me-2" style="color:#7edfee"></i>
                <span>The reset link will expire in <strong style="color:#7edfee;">30 minutes</strong>. Check your spam folder if you don't see the email.</span>
            </div>
        </div>
    </div>
</div>

<style>
.animate-in { opacity:0; transform:translateY(18px); animation:fadeUp 0.5s ease forwards; animation-delay:var(--delay,0s); }
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.fp-icon {
    width:72px; height:72px; border-radius:50%;
    background:rgba(220,53,69,0.1); border:2px solid rgba(220,53,69,0.3);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 20px; position:relative;
}
.fp-icon-ring {
    position:absolute; width:88px; height:88px; border-radius:50%;
    border:1px solid rgba(220,53,69,0.15);
    animation:ringPulse 2s ease-in-out infinite;
}
@keyframes ringPulse {
    0%,100%{transform:scale(1);opacity:0.4}
    50%{transform:scale(1.08);opacity:0.9}
}
.fp-label { color:rgba(255,255,255,0.65); font-weight:500; font-size:0.88rem; margin-bottom:7px; display:block; }
.fp-input-wrap { position:relative; }
.fp-input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#dc3545; font-size:0.85rem; }
.fp-input {
    width:100%; padding:13px 14px 13px 42px;
    background:rgba(255,255,255,0.05) !important;
    border:1px solid rgba(255,255,255,0.1) !important;
    color:#e0e0e0 !important; border-radius:12px;
    font-size:0.92rem; transition:all 0.3s;
}
.fp-input:focus {
    border-color:rgba(220,53,69,0.5) !important;
    box-shadow:0 0 0 3px rgba(220,53,69,0.1) !important;
    outline:none;
}
.fp-input::placeholder { color:rgba(255,255,255,0.2) !important; }
.fp-submit-btn {
    width:100%; padding:14px;
    background:linear-gradient(135deg,#dc3545,#b02a37);
    border:none; border-radius:12px; color:white;
    font-weight:700; font-size:1rem; cursor:pointer;
    position:relative; overflow:hidden;
    box-shadow:0 5px 20px rgba(220,53,69,0.4);
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.fp-submit-btn:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 10px 30px rgba(220,53,69,0.55); }
.fp-btn-shine {
    position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    animation:shine 2.5s infinite;
}
@keyframes shine { 0%{left:-100%} 50%,100%{left:100%} }
.fp-info {
    background:rgba(13,202,240,0.05); border:1px solid rgba(13,202,240,0.15);
    border-radius:12px; padding:14px 16px;
    color:#888; font-size:0.84rem; line-height:1.6;
    display:flex; align-items:flex-start; gap:4px;
}
</style>
{% endblock %}
