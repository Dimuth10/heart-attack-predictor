{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height:80vh;">
    <div class="col-md-5">
        <div class="glass-card p-5" style="border:1px solid rgba(220,53,69,0.2);">

            <!-- Header -->
            <div class="text-center mb-5">
                <div style="width:80px; height:80px; background:rgba(220,53,69,0.1); border:1px solid rgba(220,53,69,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                    <i class="fas fa-heartbeat fa-2x animate-heartbeat" style="color:#dc3545; filter:drop-shadow(0 0 10px rgba(220,53,69,0.4))"></i>
                </div>
                <h3 style="color:white; font-weight:800; margin-bottom:8px;">Welcome Back</h3>
                <p style="color:#555; font-size:0.9rem;">Sign in to your CardioPredict AI account</p>
            </div>

            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="mb-5">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                </div>
                <div class="d-grid mb-4">
                    <button type="submit" class="btn btn-danger btn-lg py-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </div>
            </form>

            <div class="divider" style="margin:20px 0;"></div>

            <div class="text-center">
                <p style="color:#555; font-size:0.9rem; margin:0;">Don't have an account?
                    <a href="/register" style="color:#dc3545; text-decoration:none; font-weight:600;"> Register here →</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
